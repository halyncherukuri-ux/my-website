<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Website</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
}

header {
  background: linear-gradient(to right, #4facfe, #00f2fe);
  color: white;
  text-align: center;
  padding: 20px;
}

.hero {
  text-align: center;
  padding: 60px 20px;
  background: #f5f5f5;
}

.hero h1 {
  font-size: 32px;
}

.btn {
  display: inline-block;
  padding: 10px 20px;
  background: #4facfe;
  color: white;
  text-decoration: none;
  border-radius: 5px;
  margin-top: 10px;
}

.section {
  padding: 40px 20px;
  text-align: center;
}

.cards {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 20px;
}

.card {
  background: white;
  padding: 20px;
  width: 250px;
  border-radius: 10px;
  box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

footer {
  background: #222;
  color: white;
  text-align: center;
  padding: 15px;
}
</style>

</head>
<body>

<header>
  <h2>Cherukuri Halyn Grace Chowdary</h2>
</header>

<div class="hero">
  <h1>I create websites for low price</h1>
  <p>Simple | Clean | Fast</p>
  <a href="#" class="btn">Contact Me</a>
</div>

<div class="section">
  <h2>My Services</h2>
  <div class="cards">
    <div class="card">
      <h3>Landing Page</h3>
      <p>Perfect for promotions</p>
    </div>
    <div class="card">
      <h3>Portfolio</h3>
      <p>Show your work online</p>
    </div>
    <div class="card">
      <h3>Business Site</h3>
      <p>Grow your brand</p>
    </div>
  </div>
</div>

<div class="section">
  <h2>Contact</h2>
  <p>Email: halyncherukuri@gmail.com</p>
</div>

<footer>
  <p>© 2026 All Rights Reserved</p>
</footer>

</body>
</html>
